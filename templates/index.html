<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">

<title>House Price Predictor</title>

</head>

<body class="bg-dark">

<div class="container">
<div class="row">
<div class="card" style="width:100%; margin-top:50px">

<div class="card-header text-center">
<h1>House Price Predictor</h1>
</div>

<div class="card-body">

<form id="prediction-form">

<div class="row">

<div class="col-md-6 form-group text-center">
<label><b>Select Location:</b></label>

<select class="form-control" name="location" required>
{% for location in locations %}
<option value="{{ location }}">{{ location }}</option>
{% endfor %}
</select>

</div>


<div class="col-md-6 form-group text-center">
<label><b>Enter BHK:</b></label>
<input type="number" class="form-control"
name="BHK" placeholder="Enter BHK" required>
</div>


<div class="col-md-6 form-group text-center">
<label><b>Enter Bathrooms:</b></label>
<input type="number" class="form-control"
name="bath" placeholder="Enter Bathrooms" required>
</div>


<div class="col-md-6 form-group text-center">
<label><b>Enter Square Feet:</b></label>
<input type="number" class="form-control"
name="total_sqft" placeholder="Enter Square Feet" required>
</div>


<div class="col-md-12 form-group">
<button type="submit"
class="btn btn-primary form-control">
Predict Price
</button>
</div>

</div>
</form>

<br>

<div class="text-center">
<h3 id="prediction"></h3>
</div>

</div>
</div>
</div>
</div>

<!-- ================= JAVASCRIPT ================= -->

<script>

document.getElementById("prediction-form")
.addEventListener("submit", function(event){

event.preventDefault();

let formData = new FormData(this);

let xhr = new XMLHttpRequest();

xhr.open("POST", "/predict", true);

document.getElementById("prediction").innerHTML =
"Predicting Price...";

xhr.onreadystatechange = function(){

if(xhr.readyState === 4 && xhr.status === 200){

document.getElementById("prediction").innerHTML =
"Prediction: ₹ " + xhr.responseText;

}

};

xhr.send(formData);

});

</script>

</body>
</html>
